name: CI/CD Deploy Lururu App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Kode
        uses: actions/checkout@v4

      - name: Jalankan Deployment dengan Dekripsi Kunci Native
        run: |
          mkdir -p ~/.ssh
          
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh -6 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@2402:8780:106d:1e3d:4573:16e6:c10a:ea59 << 'EOF'
            cd /var/www/html/Lururu
            
            git pull origin main
            
            docker build -t lururu-app .
            docker rm -f lururu-container 2>/dev/null || true
            
            docker run -d \
              --name lururu-container \
              -p 5000:5000 \
              --add-host=host.docker.internal:host-gateway \
              --restart always \
              lururu-app
              
            docker image prune -f
          EOF