name: CI/CD Deploy Lururu App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Kode
        uses: actions/checkout@v4

      - name: Eksekusi Perintah Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/html/Lururu

            git pull origin main

            docker build -t lururu-app .

            docker rm -f lururu-container 2>/dev/null || true

            docker run -d \
              --name lururu-container \
              -p 5000:5000 \
              --add-host=host.docker.internal:host-gateway \
              --restart always \
              lururu-app
              
            docker image prune -f
