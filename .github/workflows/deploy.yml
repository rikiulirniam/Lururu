name: CI/CD Deploy Lururu App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Kode
        uses: actions/checkout@v4

      - name: Install Cloudflare Client di Runner GitHub
        run: |
          sudo mkdir -p /usr/local/bin
          curl -L --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared

      - name: Jalankan Deployment via Cloudflare Tunnel Bridge
        run: |
          # 1. Siapkan folder dan kunci SSH di runner GitHub
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. Konfigurasi agar SSH otomatis lewat jalur pipa cloudflared ke subdomain Anda
          cat << 'EOF' > ~/.ssh/config
          Host ssh-deploy.rikiulir.site
              ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
              IdentityFile ~/.ssh/id_rsa
              User root
              StrictHostKeyChecking no
          EOF
          
          # 3. Eksekusi SSH langsung menggunakan nama domain ssh-deploy Anda
          ssh root@ssh-deploy.rikiulir.site << 'EOF'
            cd /var/www/html/Lururu
            git pull origin main
            docker build -t lururu-app .
            docker rm -f lururu-container 2>/dev/null || true
            docker run -d \
              --name lururu-container \
              -p 5000:5000 \
              --add-host=host.docker.internal:host-gateway \
              --restart always \
              lururu-app
            docker image prune -f
          EOF