name: CI/CD Deploy Lururu App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Kode
        uses: actions/checkout@v4

      - name: Jalankan SSH Deployment Standar
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Masuk secara native ke host deploy baru Anda
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /var/www/html/Lururu
            git pull origin main
            docker build -t lururu-app .
            docker rm -f lururu-container 2>/dev/null || true
            docker run -d \
              --name lururu-container \
              -p 5000:5000 \
              --add-host=host.docker.internal:host-gateway \
              --restart always \
              lururu-app
            docker image prune -f
          EOF