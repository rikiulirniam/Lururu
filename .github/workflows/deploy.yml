name: CI/CD Deploy Lururu App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository Kode
        uses: actions/checkout@v4

      - name: Jalankan Build dan Deploy Lokal
        run: |
          cd /var/www/html/Lururu
          git pull origin main
          docker build -t lururu-app .
          docker rm -f lururu-container 2>/dev/null || true
          docker run -d \
            --name lururu-container \
            -p 5000:5000 \
            --add-host=host.docker.internal:host-gateway \
            --restart always \
            lururu-app
          docker image prune -f